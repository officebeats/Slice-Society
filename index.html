<!DOCTYPE html>
<html lang="en" class="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Slice-Society</title>
    <meta name="description" content="Slice-Society: Chicago's Pizza Doughmocracy" />
    <meta name="theme-color" content="#FF5733" />
    <link rel="manifest" href="/manifest.json" />
    
    <link rel="apple-touch-icon" href="https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&w=192&h=192&q=60" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <!-- Leaflet MarkerCluster CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              black: "rgb(var(--color-black) / <alpha-value>)", 
              white: "rgb(var(--color-white) / <alpha-value>)",
              primary: "#FF5733",
              secondary: "#FFD700",
              chicago: "#41B6E6",
              "background-light": "rgb(var(--color-bg-light) / <alpha-value>)",
              "background-dark": "#1A1A1A",
              "rating-low": "#FF3131",
              "rating-mid": "#FFA500",
              "rating-high": "#22C55E",
            },
            fontFamily: {
              display: ["Fredoka One", "cursive"],
              sans: ["Quicksand", "sans-serif"],
            },
            borderRadius: {
              DEFAULT: "12px",
            },
          },
        },
      };
    </script>
    <style type="text/tailwindcss">
      @layer base {
        :root {
          --color-black: 0 0 0;
          --color-white: 255 255 255;
          --color-bg-light: 255 249 240;
        }
      }

      @layer utilities {
        .bold-border {
          border: 3px solid rgb(var(--color-black));
        }
        .card-shadow {
          box-shadow: 4px 4px 0 0 rgb(var(--color-black));
        }
        .bubble-shadow {
          box-shadow: 3px 3px 0 0 rgb(var(--color-black));
        }
        .nav-border {
          border-top: 5px solid rgb(var(--color-black));
        }
        .material-symbols-outlined {
          font-variation-settings: "FILL" 1, "wght" 700, "GRAD" 0, "opsz" 24;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .chicago-star {
          clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
          background-color: #FF0000;
          width: 14px;
          height: 14px;
          display: inline-block;
        }
        
        .text-sticker {
          text-shadow: 
             1.5px 1.5px 0 #000,
            -1.5px -1.5px 0 #000,  
             1.5px -1.5px 0 #000,
            -1.5px 1.5px 0 #000,
             0px 1.5px 0 #000,
             0px -1.5px 0 #000,
             1.5px 0px 0 #000,
            -1.5px 0px 0 #000;
        }

        .sticker-base {
           @apply text-white bold-border rounded-xl font-display uppercase bubble-shadow transition-all duration-200 flex items-center justify-center text-center;
        }

        /* Custom Range Slider */
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
            cursor: pointer;
            width: 100%
        }
        input[type="range"]::-webkit-slider-runnable-track {
            background: #E5E7EB;
            height: 12px;
            border-radius: 6px;
            border: 3px solid rgb(var(--color-black));
        }
        .track-low::-webkit-slider-runnable-track { background: #FF3131 !important; }
        .track-mid::-webkit-slider-runnable-track { background: #FFA500 !important; }
        .track-high::-webkit-slider-runnable-track { background: #22C55E !important; }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            margin-top: -16px;
            height: 40px;
            width: 40px;
            background-color: rgb(var(--color-white));
            border: 4px solid rgb(var(--color-black));
            border-radius: 50%;
            box-shadow: 2px 2px 0 rgb(var(--color-black));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .seal-rotate {
            animation: slow-rotate 20s linear infinite;
        }
        @keyframes slow-rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Cluster Styling Fixes */
        .marker-cluster {
            background-clip: padding-box;
            border-radius: 50%;
            background-color: transparent !important;
        }
        .marker-cluster div {
            width: 30px;
            height: 30px;
            margin-left: 5px;
            margin-top: 5px;
            text-align: center;
            border-radius: 50%;
            font-family: 'Fredoka One', cursive;
            font-size: 14px;
            background-color: transparent !important;
        }
        .marker-cluster-small, .marker-cluster-medium, .marker-cluster-large {
            background-color: transparent !important;
        }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-background-light text-black overflow-x-hidden min-h-[100dvh]">
    <div id="root"></div>
    
    <!-- Leaflet JS (Global) -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Leaflet MarkerCluster JS -->
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/' }).then(registration => {
            console.log('SW registered: ', registration);
          }).catch(registrationError => {
            console.log('SW registration failed: ', registrationError);
          });
        });
      }
    </script>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
